services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: agenthifive
      POSTGRES_PASSWORD: test-password
      POSTGRES_DB: agenthifive_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenthifive"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_started

  docs:
    build:
      context: ..
      dockerfile: apps/docs/Dockerfile
      args:
        DOCS_BASE_URL: /docs/

  nginx:
    image: nginx:alpine
    ports:
      - "3100:80"
      - "8180:8080"
    volumes:
      - ./nginx/integration.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
      - docs

  # ── E2E Agent Auth Testing ───────────────────────────────────────
  # Run with: make e2e (or docker compose --profile e2e ...)

  echo:
    image: jmalloc/echo-server
    environment:
      PORT: "8080"
    profiles:
      - e2e

  e2e-runner:
    build:
      context: ..
      dockerfile: integration-testing/e2e/Dockerfile
    env_file: .env
    environment:
      AH5_API_URL: http://api:4000
      AGENT_TOKEN_AUDIENCE: http://api:4000
    depends_on:
      api:
        condition: service_healthy
      echo:
        condition: service_started
    profiles:
      - e2e
