services:
  postgres-test:
    image: postgres:15-alpine
    container_name: agenthifive-test-db
    environment:
      POSTGRES_DB: agenthifive_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"  # Different port from dev database (5432)
    volumes:
      - agenthifive-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d agenthifive_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    command:
      - "postgres"
      - "-c"
      - "log_statement=none"  # Reduce log noise in tests
      - "-c"
      - "log_duration=off"

volumes:
  agenthifive-test-data:
    name: agenthifive-test-data
