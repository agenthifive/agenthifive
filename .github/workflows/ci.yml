name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: agenthifive_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test -d agenthifive_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Apply migration files
        run: pnpm --filter @agenthifive/api run migrate-apply
        env:
          DATABASE_URL: postgresql://test:test_password@localhost:5433/agenthifive_test

      - name: Check migration files are up to date
        run: |
          pnpm --filter @agenthifive/api exec drizzle-kit generate --name ci-drift-check 2>&1
          if git diff --name-only -- 'apps/api/drizzle/' | grep -q .; then
            echo "::error::Migration files are out of date! Run 'make migrate-generate' and commit the result."
            git diff --stat -- 'apps/api/drizzle/'
            exit 1
          fi
          git checkout -- 'apps/api/drizzle/' 2>/dev/null || true
        env:
          DATABASE_URL: postgresql://test:test_password@localhost:5433/agenthifive_test

      - name: Lint
        run: pnpm turbo run lint

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Test
        run: pnpm turbo run test
        env:
          DATABASE_URL: postgresql://test:test_password@localhost:5433/agenthifive_test

  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm --filter @agenthifive/docs build
